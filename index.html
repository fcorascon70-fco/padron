<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Dashboard | fcorascon70-fco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <i data-lucide="shield-check"></i>
            </div>
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para acceder</p>
            <div id="login-error" class="login-error hidden">
                Usuario o contraseña incorrectos
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="login-username" placeholder="Tu usuario" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-section="miembros">
                        <i data-lucide="users"></i>
                        <span>Miembros</span>
                    </li>
                    <li class="nav-item" data-section="padrinos">
                        <i data-lucide="heart"></i>
                        <span>Padrinos</span>
                    </li>
                    <li class="nav-item" data-section="status">
                        <i data-lucide="check-circle"></i>
                        <span>Status</span>
                    </li>
                    <li class="nav-item" data-section="reportes">
                        <i data-lucide="bar-chart-3"></i>
                        <span>Reportes</span>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i data-lucide="user"></i>
                    <span id="current-username">Admin</span>
                </div>
                <div id="logout-btn" class="logout-btn">
                    <i data-lucide="log-out" style="width: 18px;"></i>
                    <span>Cerrar Sesión</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1 id="section-title">Miembros</h1>
                    <p id="section-description">Gestión y control de la lista de miembros.</p>
                </div>
                <div class="header-right">
                    <div id="stats-summary" class="stats-badge">
                        Cargando...
                    </div>
                </div>
            </header>

            <section id="content-area" class="section-content">
                <!-- Data will be injected here by app.js -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Conectando con Supabase...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Editing/Viewing -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content card">
            <div class="modal-header">
                <h2 id="modal-title">Editar Registro</h2>
                <button id="close-modal" class="btn-icon">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="edit-form" class="modal-body">
                <!-- Form fields will be dynamically injected here -->
            </form>
            <div class="modal-footer">
                <button id="cancel-btn" class="btn btn-secondary">Cancelar</button>
                <button id="save-btn" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
